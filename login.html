<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){try{var t=localStorage.getItem('pp_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso administrativo — Port Promos</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/brand/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/img/brand/favicon-180.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
<style>
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .pp-login-card{
    width:100%;max-width:380px;background:var(--bg-elevated);border:1px solid var(--border-color);
    border-radius:var(--radius-lg);padding:2.2rem 2rem;box-shadow:0 30px 60px rgba(0,0,0,.35);
  }
  .pp-login-card .pp-logo-img{height:48px;margin:0 auto 1.6rem;display:block}
</style>
</head>
<body>

<div class="pp-login-card">
  <img src="assets/img/brand/logo.png" alt="Port Promos" class="pp-logo-img">
  <h1 style="font-size:1.15rem;font-weight:800;text-align:center;margin-bottom:.3rem;">Acesso administrativo</h1>
  <p style="text-align:center;color:var(--text-muted);font-size:.85rem;margin-bottom:1.6rem;">Restrito à equipe Port Promos</p>

  <div id="pp-login-alert" class="alert alert-danger d-none" role="alert" style="font-size:.85rem;"></div>

  <form id="pp-login-form" novalidate>
    <div class="mb-3">
      <label for="pp-email" class="form-label" style="font-size:.85rem;">E-mail</label>
      <input type="email" class="form-control" id="pp-email" required autocomplete="username">
    </div>
    <div class="mb-3">
      <label for="pp-password" class="form-label" style="font-size:.85rem;">Senha</label>
      <input type="password" class="form-control" id="pp-password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-pp-cta w-100" id="pp-login-btn">
      <span class="pp-login-btn-text">Entrar</span>
    </button>
  </form>

  <a href="index.html" class="d-block text-center mt-4" style="font-size:.8rem;color:var(--text-muted);">
    <i class="bi bi-arrow-left"></i> Voltar para o site
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabaseClient.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/login.js"></script>
</body>
</html>
